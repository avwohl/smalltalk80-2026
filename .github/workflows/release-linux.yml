name: Linux release packages

# Builds .deb and .rpm for x86_64 and aarch64 and attaches them
# to the GitHub release that matches the pushed tag.
#
# Triggers:
#   - push of a tag matching v*      → build + publish to that release
#   - workflow_dispatch              → build only, upload as artifacts
#
# Runners:
#   x86_64  → ubuntu-24.04        (GitHub-hosted, free on public repos)
#   aarch64 → ubuntu-24.04-arm    (GitHub-hosted ARM, free on public repos)
#
# Package layout is defined by cmake/LinuxPackaging.cmake.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write   # needed to upload release assets

jobs:
  build:
    name: ${{ matrix.arch }} (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
            deb_arch: amd64
          - runner: ubuntu-24.04-arm
            arch: aarch64
            deb_arch: arm64

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            build-essential \
            pkg-config \
            libsdl2-dev \
            libgtk-4-dev \
            libcurl4-openssl-dev \
            rpm \
            file \
            dpkg-dev

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Package (.deb)
        working-directory: build
        run: cpack -G DEB

      - name: Package (.rpm)
        working-directory: build
        run: cpack -G RPM

      - name: Collect packages
        id: collect
        run: |
          mkdir -p dist
          cp build/*.deb build/*.rpm dist/
          ls -la dist/
          echo "Packages built:"
          for f in dist/*; do
            echo "  $f ($(stat -c%s "$f") bytes)"
          done

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: st80-linux-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          fail_on_unmatched_files: true
